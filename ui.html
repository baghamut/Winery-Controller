<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cask &amp; Crown – Winery Controller</title>
<style>
:root{
  --bg-main:#111111;
  --bg-card:#202020;
  --bg-row:#181818;
  --accent:#ff7a1a;
  --accent-danger:#e02424;
  --accent-green:#65ff7a;
  --text-main:#f5f5f5;
  --text-muted:#b3b3b3;
  --border-subtle:#333333;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:system-ui,-apple-system,sans-serif;
  background:#000;
  color:var(--text-main);
  display:flex;
  justify-content:center;
  padding:24px 12px;
}
.app-shell{width:100%;max-width:520px;}

/* Header */
.app-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
.app-header-main{flex:1 1 auto;}
.app-title{font-size:1.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);}
.app-subtitle{font-size:.9rem;color:var(--text-muted);margin-top:4px;}
.header-status{text-align:right;font-size:.8rem;}
.header-status-main{font-weight:700;text-transform:uppercase;}
.header-status-line{margin-top:2px;color:var(--text-muted);}
hr.divider{border:none;border-top:2px solid var(--accent);margin:8px auto 14px;}

/* Card */
.card{background:var(--bg-card);border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.5);}
.card-title{font-size:.85rem;font-weight:600;text-transform:uppercase;letter-spacing:.14em;color:var(--accent);margin-bottom:12px;}

/* Mode screen */
.mode-row{display:flex;gap:12px;}
.mode-btn{flex:1;padding:26px 12px;border-radius:10px;border:2px solid var(--accent);background:#303030;color:var(--accent);font-size:1.1rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;transition:.2s;}
.mode-btn:hover,.mode-btn.active{background:var(--accent);color:#111;}

/* SSR rows */
.ssr-row{display:flex;align-items:center;gap:8px;margin:4px 0;padding:4px 6px;border-radius:6px;background:var(--bg-row);}
.ssr-label{width:52px;font-weight:600;color:var(--text-muted);}
.ssr-slider{flex:1;}
.ssr-slider input[type=range]{width:100%;accent-color:var(--accent);}
.ssr-percentage{width:48px;text-align:center;font-size:.85rem;color:var(--text-muted);}
.ssr-toggle{display:flex;align-items:center;gap:4px;}

/* Toggle switch */
.switch{position:relative;display:inline-block;width:40px;height:20px;}
.switch input{opacity:0;width:0;height:0;}
.slider-switch{position:absolute;cursor:pointer;inset:0;background-color:#555;transition:.2s;border-radius:34px;}
.slider-switch:before{position:absolute;content:"";height:16px;width:16px;left:2px;bottom:2px;background-color:#fff;transition:.2s;border-radius:50%;}
.switch input:checked + .slider-switch{background-color:var(--accent);}
.switch input:checked + .slider-switch:before{transform:translateX(20px);}

/* Sensor limits row */
.limits-row{margin-top:10px;padding:6px;border-radius:6px;background:var(--bg-row);display:flex;align-items:center;gap:8px;}
.limits-label{font-weight:600;color:var(--text-muted);font-size:.85rem;flex-shrink:0;}
.limits-btns{flex:1;display:flex;gap:6px;}
.limit-sensor-btn{flex:1;padding:5px 4px;border-radius:4px;border:1px solid #555;background:#383838;color:var(--text-main);font-size:.75rem;font-weight:600;cursor:pointer;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:.15s;}
.limit-sensor-btn:hover{border-color:var(--accent);color:var(--accent);}
.limit-sensor-btn.active{border-color:var(--accent);background:var(--accent);color:#111;}

/* Tmax inline editor */
.tmax-editor{margin-top:8px;padding:12px;border-radius:8px;background:var(--bg-row);border:1px solid var(--border-subtle);}
.tmax-editor-title{color:var(--accent);font-weight:700;font-size:.85rem;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;}
.tmax-editor-controls{display:flex;align-items:center;justify-content:space-evenly;gap:6px;margin-bottom:10px;}
.tmax-adj-btn{min-width:48px;padding:6px 0;border-radius:6px;border:1px solid var(--accent);background:var(--bg-main);color:var(--text-main);font-size:.85rem;font-weight:600;cursor:pointer;text-align:center;}
.tmax-adj-btn:hover{background:var(--accent);color:#111;}
.tmax-editor-controls input[type=number]{width:88px;padding:5px;border-radius:4px;border:1px solid var(--accent);background:var(--bg-main);color:var(--text-main);font-size:1.1rem;font-weight:700;text-align:center;}

/* Buttons */
.control-actions{display:flex;gap:8px;margin-top:12px;}
.btn{width:100%;padding:10px 12px;border-radius:6px;border:none;font-size:.9rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;transition:.2s;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-back{background:#ee3b3b;color:#fff;}
.btn-start{background:#008b00;color:#fff;}
.btn-stop{background:var(--accent-danger);color:#fff;}
.btn-save{background:#008b00;color:#fff;}

/* Monitor rows */
.row{display:flex;justify-content:space-between;align-items:center;font-size:.9rem;padding:4px 8px;margin:2px 0;border-radius:6px;background:var(--bg-row);}
.row span.label{color:var(--text-muted);}
.row span.value{color:var(--text-main);}

/* SSR pills */
.ssr-pill{display:inline-block;padding:2px 6px;margin:1px 2px;border-radius:4px;border:1px solid var(--border-subtle);font-size:.8rem;}
.ssr-pill.on{border-color:var(--accent-green);color:var(--accent-green);}
.ssr-pill.off{border-color:var(--accent-danger);color:var(--accent-danger);}

/* Threshold config card */
.thresh-tabs{display:flex;gap:6px;margin-bottom:10px;}
.thresh-tab{flex:1;padding:6px 0;border-radius:6px;border:1px solid var(--accent);background:var(--bg-main);color:var(--text-muted);font-size:.8rem;font-weight:600;text-transform:uppercase;cursor:pointer;text-align:center;}
.thresh-tab.active{background:var(--accent);color:#111;}
.thresh-row{display:flex;align-items:center;gap:6px;margin:4px 0;padding:4px 6px;border-radius:6px;background:var(--bg-row);font-size:.82rem;}
.thresh-row .t-name{width:84px;color:var(--text-muted);font-weight:600;flex-shrink:0;}
.thresh-row label{color:var(--text-muted);font-size:.75rem;flex-shrink:0;}
.thresh-row input[type=number]{width:62px;padding:3px 5px;border-radius:4px;border:1px solid var(--border-subtle);background:var(--bg-main);color:var(--text-main);font-size:.82rem;text-align:center;}
.thresh-save{width:100%;margin-top:8px;padding:7px 0;border-radius:6px;border:none;background:#008b00;color:#fff;font-size:.85rem;font-weight:600;text-transform:uppercase;cursor:pointer;}

.header-ip{cursor:pointer;}
</style>
</head>
<body>
<div class="app-shell">
  <header class="app-header">
    <div class="app-header-main">
      <div class="app-title">Cask &amp; Crown</div>
      <div class="app-subtitle" id="subtitle">Winery Controller</div>
    </div>
    <div class="header-status">
      <div class="header-status-main" id="hdrStatus">STOPPED</div>
      <div class="header-status-line" id="hdrLine1">Room: --</div>
      <div class="header-status-line" id="hdrLine2">Max: --</div>
      <div class="header-status-line header-ip" id="hdrLine3">IP: --</div>
    </div>
  </header>
  <hr class="divider">

  <!-- MODE SCREEN -->
  <div id="screen-mode">
    <section class="card">
      <div class="card-title">Select Mode</div>
      <div class="mode-row">
        <button class="mode-btn" id="btnModeDist">DISTILLATION</button>
        <button class="mode-btn" id="btnModeRect">RECTIFICATION</button>
      </div>
    </section>
  </div>

  <!-- CONTROL SCREEN -->
  <div id="screen-control" style="display:none;">
    <section class="card">
      <div class="card-title" id="controlTitle">Control</div>
      <div id="ssrControls"></div>

      <div class="limits-row">
        <div class="limits-label">Limits:</div>
        <div class="limits-btns" id="limitsBtns"></div>
      </div>

      <div class="tmax-editor" id="tmaxEditor" style="display:none;">
        <div class="tmax-editor-title">Set Sensor Max Temp</div>
        <div class="tmax-editor-controls">
          <button class="tmax-adj-btn" id="btnTmaxM5">-5</button>
          <button class="tmax-adj-btn" id="btnTmaxM1">-1</button>
          <input type="number" id="tmaxInput" step="0.5" min="0" max="200">
          <button class="tmax-adj-btn" id="btnTmaxP1">+1</button>
          <button class="tmax-adj-btn" id="btnTmaxP5">+5</button>
        </div>
        <div class="control-actions">
          <button class="btn btn-back" id="btnTmaxBack">BACK</button>
          <button class="btn btn-save"  id="btnTmaxSave">SAVE</button>
        </div>
      </div>

      <div id="ctrlActions" class="control-actions">
        <button class="btn btn-back"  id="btnBack">BACK</button>
        <button class="btn btn-start" id="btnStart">START</button>
      </div>
    </section>

    <section class="card" id="threshCard">
      <div class="card-title">Sensor Thresholds</div>
      <div class="thresh-tabs">
        <div class="thresh-tab active" id="tabDist" onclick="switchThreshTab('dist')">Distillation</div>
        <div class="thresh-tab"        id="tabRect" onclick="switchThreshTab('rect')">Rectification</div>
      </div>
      <div id="threshBody"></div>
      <button class="thresh-save" id="btnThreshSave">Save Thresholds</button>
    </section>
  </div>

  <!-- MONITOR SCREEN -->
  <div id="screen-monitor" style="display:none;">
    <section class="card">
      <div class="card-title">Monitor</div>
      <div class="row"><span class="label">Room</span>     <span class="value" id="mT1">--</span></div>
      <div class="row"><span class="label">Tank</span>     <span class="value" id="mT2">--</span></div>
      <div class="row"><span class="label">Pillar</span>   <span class="value" id="mT3">--</span></div>
      <div class="row"><span class="label">Pressure</span> <span class="value" id="mP">--</span></div>
      <div class="row"><span class="label">Level</span>    <span class="value" id="mLevel">--</span></div>
      <div class="row"><span class="label">Flow</span>     <span class="value" id="mFlow">--</span></div>
      <div class="row"><span class="label">Total</span>    <span class="value" id="mTotal">--</span></div>
      <div class="row"><span class="label">SSRs</span>     <span class="value" id="mSSR">--</span></div>
      <div style="margin-top:8px;">
        <button class="btn btn-stop" id="btnStop">STOP</button>
      </div>
    </section>
  </div>
</div>

<script>
(function(){
  // All fetches are relative — this file is served by the device itself
  var SENSOR_NAMES = ["Room","Tank","Pillar"];
  var lastModeForSSR   = null;
  var activeTmaxSensor = 1;
  var threshTabActive  = "dist";
  var threshCache      = null;

  function $(id){ return document.getElementById(id); }

  function showScreen(id){
    ["screen-mode","screen-control","screen-monitor"].forEach(function(s){
      var el=$(s); if(el) el.style.display=(s===id)?"block":"none";
    });
  }

  function send(cmd){
    return fetch("/",{method:"POST",headers:{"Content-Type":"text/plain"},body:cmd});
  }

  async function fetchState(){
    try{
      var r=await fetch("/state",{cache:"no-store"});
      if(!r.ok) return;
      var s=await r.json();
      applyState(s);
    }catch(e){ console.error("fetchState",e); }
  }

  function formatTemp(v){
    var t=Number(v);
    return(isNaN(t)||t<=-120)?"Offline":t.toFixed(1)+"°C";
  }

  function setThreshColor(id,val,warn,danger){
    var el=$(id); if(!el) return;
    if(val==null||val<=-120||val<=-900) el.style.color="#e02424";
    else if(val>=danger)                el.style.color="#e02424";
    else if(val>=warn)                  el.style.color="#ff7a1a";
    else                                el.style.color="#65ff7a";
  }

  function setValColor(id,bad){
    var el=$(id); if(el) el.style.color=bad?"#e02424":"";
  }

  // ---------------------------------------------------------------------------
  // Sensor limit buttons
  // ---------------------------------------------------------------------------
  function buildLimitButtons(s){
    var c=$("limitsBtns"); if(!c) return;
    var pm=s.processMode||0;
    var thr=(pm===2)?s.threshRect:s.threshDist;
    c.innerHTML="";
    for(var i=0;i<3;i++){
      var val=(thr&&thr.tempDanger&&thr.tempDanger[i]!=null)?thr.tempDanger[i].toFixed(1):"--";
      var btn=document.createElement("button");
      btn.className="limit-sensor-btn";
      btn.id="limitBtn"+(i+1);
      btn.textContent=SENSOR_NAMES[i]+": "+val+(val!=="--"?"°C":"");
      (function(sensor,iv){
        btn.onclick=function(){ openTmaxEditor(sensor,parseFloat(iv)); };
      })(i+1,val);
      c.appendChild(btn);
    }
  }

  function openTmaxEditor(sensor,initVal){
    activeTmaxSensor=sensor;
    for(var i=1;i<=3;i++){
      var b=$("limitBtn"+i);
      if(b) b.classList.toggle("active",i===sensor);
    }
    var inp=$("tmaxInput");
    if(inp) inp.value=isNaN(initVal)?"":initVal.toFixed(1);
    $("tmaxEditor").style.display="block";
    $("ctrlActions").style.display="none";
  }

  function closeTmaxEditor(){
    $("tmaxEditor").style.display="none";
    $("ctrlActions").style.display="flex";
    for(var i=1;i<=3;i++){
      var b=$("limitBtn"+i); if(b) b.classList.remove("active");
    }
  }

  // ---------------------------------------------------------------------------
  // SSR control rows
  // ---------------------------------------------------------------------------
  function buildSsrControls(s){
    var c=$("ssrControls"); if(!c) return;
    var pm=s.processMode||0;
    var ssrs=pm===1?[1,2,3]:pm===2?[4,5]:[];
    if(pm!==lastModeForSSR){
      lastModeForSSR=pm;
      c.innerHTML="";
      if(!ssrs.length) return;
      ssrs.forEach(function(i){
        var idx=i-1;
        var power=(s.ssrPower&&s.ssrPower[idx])||0;
        var on=(s.ssrOn&&s.ssrOn[idx])||false;

        var row=document.createElement("div"); row.className="ssr-row";

        var lbl=document.createElement("div"); lbl.className="ssr-label";
        lbl.textContent="SSR"+i; row.appendChild(lbl);

        var sw_wrap=document.createElement("div"); sw_wrap.className="ssr-slider";
        var sl=document.createElement("input"); sl.type="range"; sl.min="0"; sl.max="100";
        sl.value=power; sl.setAttribute("data-ssr",String(i));
        sw_wrap.appendChild(sl); row.appendChild(sw_wrap);

        var pct=document.createElement("div"); pct.className="ssr-percentage";
        pct.setAttribute("data-ssr-pct",String(i));
        pct.textContent=power.toFixed(0)+"%"; row.appendChild(pct);

        var sw=document.createElement("label"); sw.className="switch";
        var chk=document.createElement("input"); chk.type="checkbox";
        chk.setAttribute("data-ssr-on",String(i)); if(on) chk.checked=true;
        var span=document.createElement("span"); span.className="slider-switch";
        sw.appendChild(chk); sw.appendChild(span);
        var tw=document.createElement("div"); tw.className="ssr-toggle";
        tw.appendChild(sw); row.appendChild(tw);
        c.appendChild(row);
      });

      Array.prototype.forEach.call(c.querySelectorAll('input[type="range"]'),function(sl){
        sl.addEventListener("input",function(e){
          var ssr=e.target.getAttribute("data-ssr");
          var val=Number(e.target.value)||0;
          var p=c.querySelector('[data-ssr-pct="'+ssr+'"]');
          if(p) p.textContent=val.toFixed(0)+"%";
        });
        sl.addEventListener("change",function(e){
          send("SSR:"+e.target.getAttribute("data-ssr")+":PWR:"+e.target.value);
        });
      });
      Array.prototype.forEach.call(c.querySelectorAll('input[data-ssr-on]'),function(chk){
        chk.addEventListener("change",function(e){
          var ssr=e.target.getAttribute("data-ssr-on");
          send("SSR:"+ssr+":"+(e.target.checked?"ON":"OFF"));
        });
      });
    }
    ssrs.forEach(function(i){
      var idx=i-1;
      var power=(s.ssrPower&&s.ssrPower[idx])||0;
      var on=(s.ssrOn&&s.ssrOn[idx])||false;
      var rangeEl=c.querySelector('input[type="range"][data-ssr="'+i+'"]');
      var pctEl=c.querySelector('[data-ssr-pct="'+i+'"]');
      var chkEl=c.querySelector('input[data-ssr-on="'+i+'"]');
      if(rangeEl) rangeEl.value=power;
      if(pctEl)   pctEl.textContent=power.toFixed(0)+"%";
      if(chkEl)   chkEl.checked=!!on;
    });
  }

  // ---------------------------------------------------------------------------
  // Threshold card
  // ---------------------------------------------------------------------------
  function switchThreshTab(tab){
    threshTabActive=tab;
    $("tabDist").classList.toggle("active",tab==="dist");
    $("tabRect").classList.toggle("active",tab==="rect");
    if(threshCache) buildThreshCard(threshCache);
  }

  function buildThreshCard(s){
    var body=$("threshBody"); if(!body) return;
    var td=threshTabActive==="dist"?s.threshDist:s.threshRect;
    if(!td) return;
    var html="";
    for(var i=0;i<3;i++){
      var tw=(td.tempWarn&&td.tempWarn[i]!=null)?td.tempWarn[i].toFixed(1):"";
      var tdd=(td.tempDanger&&td.tempDanger[i]!=null)?td.tempDanger[i].toFixed(1):"";
      html+='<div class="thresh-row">'
           +'<div class="t-name">'+SENSOR_NAMES[i]+'</div>'
           +'<label>Warn °C</label>'
           +'<input type="number" step="0.5" id="tw_'+threshTabActive+'_'+i+'" value="'+tw+'">'
           +'<label>Danger °C</label>'
           +'<input type="number" step="0.5" id="td_'+threshTabActive+'_'+i+'" value="'+tdd+'">'
           +'</div>';
    }
    var pw=(td.pressWarn!=null)?td.pressWarn.toFixed(3):"";
    var pd=(td.pressDanger!=null)?td.pressDanger.toFixed(3):"";
    html+='<div class="thresh-row">'
         +'<div class="t-name">Pressure</div>'
         +'<label>Warn bar</label>'
         +'<input type="number" step="0.001" id="pw_'+threshTabActive+'" value="'+pw+'">'
         +'<label>Danger bar</label>'
         +'<input type="number" step="0.001" id="pd_'+threshTabActive+'" value="'+pd+'">'
         +'</div>';
    body.innerHTML=html;
  }

  async function saveThresholds(){
    var proc=threshTabActive==="dist"?"D":"R";
    var cmds=[];
    for(var i=0;i<3;i++){
      var wEl=$("tw_"+threshTabActive+"_"+i);
      var dEl=$("td_"+threshTabActive+"_"+i);
      if(wEl&&wEl.value!=="") cmds.push("THRESH:"+proc+":TW:"+i+":"+wEl.value);
      if(dEl&&dEl.value!=="") cmds.push("THRESH:"+proc+":TD:"+i+":"+dEl.value);
    }
    var pwEl=$("pw_"+threshTabActive);
    var pdEl=$("pd_"+threshTabActive);
    if(pwEl&&pwEl.value!=="") cmds.push("THRESH:"+proc+":PW:"+pwEl.value);
    if(pdEl&&pdEl.value!=="") cmds.push("THRESH:"+proc+":PD:"+pdEl.value);
    for(var c=0;c<cmds.length;c++) await send(cmds[c]);
    await fetchState();
  }

  // ---------------------------------------------------------------------------
  // Apply state to DOM
  // ---------------------------------------------------------------------------
  function applyState(s){
    var pm=s.processMode||0;
    var running=!!s.isRunning;
    var safetyTripped=!!s.safetyTripped;

    $("subtitle").textContent="Winery Controller FW "+(s.fw||"");

    // Status
    var statusEl=$("hdrStatus");
    if(safetyTripped){ statusEl.textContent="SAFETY TRIP"; statusEl.style.color="#e02424"; }
    else if(running){ statusEl.textContent="RUNNING"; statusEl.style.color="#65ff7a"; }
    else{ statusEl.textContent="STOPPED"; statusEl.style.color="#b3b3b3"; }

    // T1
    var t1Off=!(typeof s.t1==="number"&&s.t1>-120);
    var l1=$("hdrLine1");
    if(!t1Off){ l1.textContent="Room: "+s.t1.toFixed(1)+"°C"; l1.style.color="#65ff7a"; }
    else{ l1.textContent="Room: --"; l1.style.color="#e02424"; }

    // Max current temp
    var l2=$("hdrLine2");
    if(safetyTripped&&s.safetyMessage){ l2.textContent=s.safetyMessage; l2.style.color="#e02424"; }
    else{
      var temps=[s.t1,s.t2,s.t3].filter(function(t){ return typeof t==="number"&&t>-120; });
      if(!temps.length){ l2.textContent="Max: --"; l2.style.color="#b3b3b3"; }
      else{ l2.textContent="Max: "+Math.max.apply(null,temps).toFixed(1)+"°C"; l2.style.color="#b3b3b3"; }
    }

    // IP
    $("hdrLine3").textContent="IP: "+(s.ip||"0.0.0.0");

    // Mode buttons
    $("btnModeDist").classList.toggle("active",pm===1);
    $("btnModeRect").classList.toggle("active",pm===2);

    threshCache=s;
    var thr=(pm===2)?s.threshRect:s.threshDist;

    // Monitor
    $("mT1").textContent=formatTemp(s.t1);
    $("mT2").textContent=formatTemp(s.t2);
    $("mT3").textContent=formatTemp(s.t3);
    if(thr){
      setThreshColor("mT1",Number(s.t1),thr.tempWarn[0],thr.tempDanger[0]);
      setThreshColor("mT2",Number(s.t2),thr.tempWarn[1],thr.tempDanger[1]);
      setThreshColor("mT3",Number(s.t3),thr.tempWarn[2],thr.tempDanger[2]);
    } else {
      setValColor("mT1",Number(s.t1)<=-120);
      setValColor("mT2",Number(s.t2)<=-120);
      setValColor("mT3",Number(s.t3)<=-120);
    }

    var p=Number(s.pressureBar);
    var pOff=isNaN(p)||p<=-900;
    $("mP").textContent=pOff?"Offline":p.toFixed(3)+" bar";
    if(thr&&!pOff) setThreshColor("mP",p,thr.pressWarn,thr.pressDanger);
    else           setValColor("mP",pOff);

    $("mLevel").textContent=s.levelHigh?"Level OK":"Level LOW";
    $("mLevel").style.color=s.levelHigh?"#65ff7a":"#e02424";

    var f=Number(s.flowRateLPM);
    var fOff=isNaN(f)||f<=-900;
    $("mFlow").textContent=fOff?"Offline":f.toFixed(2)+" L/min";
    setValColor("mFlow",fOff);

    $("mTotal").textContent=(s.totalVolumeLiters||0).toFixed(3)+" L";

    // SSR pills
    var onArr=s.ssrOn||[]; var pwrArr=s.ssrPower||[];
    var rel=pm===1?[0,1,2]:pm===2?[3,4]:[];
    var ssrEl=$("mSSR");
    if(!rel.length){ ssrEl.textContent="--"; }
    else{
      var html="";
      rel.forEach(function(i){
        var isOn=!!onArr[i]; var pwr=(pwrArr[i]||0).toFixed(1);
        var txt=isOn?"SSR"+(i+1)+": ON "+pwr+"%":"SSR"+(i+1)+": OFF";
        html+='<span class="ssr-pill '+(isOn?"on":"off")+'">'+txt+'</span> ';
      });
      ssrEl.innerHTML=html;
    }

    // Start button
    var btnStart=$("btnStart");
    var canStart=(pm===1||pm===2)&&!running&&!safetyTripped;
    if(canStart){
      var anySSR=false;
      for(var i=0;i<5;i++){ if(onArr[i]&&(pwrArr[i]||0)>0){anySSR=true;break;} }
      if(!anySSR) canStart=false;
    }
    btnStart.disabled=!canStart;

    // Screen routing
    if(!pm){ showScreen("screen-mode"); }
    else if(!running){
      $("controlTitle").textContent=pm===1?"Distillation Control":"Rectification Control";
      buildSsrControls(s);
      buildLimitButtons(s);
      buildThreshCard(s);
      showScreen("screen-control");
    } else { showScreen("screen-monitor"); }
  }

  // ---------------------------------------------------------------------------
  // Event bindings
  // ---------------------------------------------------------------------------
  function bindEvents(){
    $("btnModeDist").onclick=async function(){ await send("MODE:1"); await fetchState(); };
    $("btnModeRect").onclick=async function(){ await send("MODE:2"); await fetchState(); };
    $("btnStart").onclick=async function(){    await send("START");  await fetchState(); };
    $("btnBack").onclick=async function(){
      await send("MODE:0"); lastModeForSSR=null; await fetchState();
    };
    $("btnStop").onclick=async function(){
      await send("STOP"); await send("MODE:0"); lastModeForSSR=null; await fetchState();
    };
    $("btnTmaxM5").onclick=function(){ var i=$("tmaxInput"); if(i) i.value=(parseFloat(i.value||0)-5).toFixed(1); };
    $("btnTmaxM1").onclick=function(){ var i=$("tmaxInput"); if(i) i.value=(parseFloat(i.value||0)-1).toFixed(1); };
    $("btnTmaxP1").onclick=function(){ var i=$("tmaxInput"); if(i) i.value=(parseFloat(i.value||0)+1).toFixed(1); };
    $("btnTmaxP5").onclick=function(){ var i=$("tmaxInput"); if(i) i.value=(parseFloat(i.value||0)+5).toFixed(1); };
    $("btnTmaxBack").onclick=function(){ closeTmaxEditor(); };
    $("btnTmaxSave").onclick=async function(){
      var inp=$("tmaxInput"); if(!inp) return;
      var val=parseFloat(inp.value); if(isNaN(val)) return;
      await send("TMAX:"+activeTmaxSensor+":SET:"+val.toFixed(1));
      closeTmaxEditor();
      await fetchState();
    };
    $("hdrLine3").onclick=async function(){
      await send("MODE:0"); lastModeForSSR=null; await fetchState();
    };
    $("btnThreshSave").onclick=saveThresholds;
  }

  window.addEventListener("DOMContentLoaded",function(){
    bindEvents();
    fetchState();
    setInterval(fetchState,3000);
  });
})();
</script>
</body>
</html>
