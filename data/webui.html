<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Winery Control</title>
  <style>
    :root {
      --bg-main: #111;
      --bg-card: #202020;
      --bg-input: #181818;
      --accent: #ff7a1a;
      --accent-danger: #e02424;
      --text-main: #f5f5f5;
      --text-muted: #b3b3b3;
      --text-green: #65ff7a;
      --border-subtle: #333;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
      color: var(--text-main);
      display: flex;
      justify-content: center;
      padding: 24px 12px;
    }

    .app-shell {
      width: 100%;
      max-width: 520px;
    }

    .app-header {
      text-align: center;
      margin-bottom: 12px;
    }

    .app-title {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .app-subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .divider {
      border: none;
      border-top: 2px solid var(--accent);
      margin: 10px auto 18px;
      max-width: 460px;
    }

    .card {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }

    .card-title {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .metric-primary {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .status-running {
      background: var(--text-green);
      color: #000;
    }

    .status-stopped {
      background: #555;
      color: #f5f5f5;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 10px;
    }

    .field-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    .field select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--border-subtle);
      background: var(--bg-input);
      color: var(--text-main);
      font-size: 0.9rem;
      appearance: none;
      -webkit-appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, var(--accent) 50%),
                        linear-gradient(135deg, var(--accent) 50%, transparent 50%);
      background-position: calc(100% - 16px) 50%, calc(100% - 10px) 50%;
      background-size: 6px 6px;
      background-repeat: no-repeat;
      padding-right: 28px;
    }

    .field select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(255, 122, 26, 0.4);
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }

    .slider-row input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
      min-height: 24px;
      cursor: pointer;
    }

    .numeric-box,
    .unit-box {
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid var(--border-subtle);
      background: var(--bg-input);
      font-size: 0.9rem;
      text-align: center;
    }

    .numeric-box {
      width: 64px;
      min-width: 64px;
    }

    .unit-box {
      width: 48px;
      min-width: 48px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      padding: 4px 0;
      border-bottom: 1px solid #262626;
    }

    .row:last-child {
      border-bottom: none;
    }

    .row-label {
      color: var(--text-muted);
    }

    .row-value {
      color: var(--text-green);
      font-weight: 500;
    }

    .btn {
      width: 100%;
      padding: 10px 12px;
      border-radius: 6px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      margin-top: 8px;
      transition: background-color 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: #111;
    }

    .btn-primary:hover:not(:disabled) {
      background: #ff9133;
    }

    .btn-danger {
      background: var(--accent-danger);
      color: #fff;
    }

    .btn-danger:hover:not(:disabled) {
      background: #f04444;
    }

    .btn-start {
      background: var(--text-green);
      color: #000;
    }

    .btn-start:hover:not(:disabled) {
      background: #7fff8d;
    }

    .btn-stop {
      background: var(--accent-danger);
      color: #fff;
    }

    .btn-stop:hover:not(:disabled) {
      background: #f04444;
    }

    .btn-ssr-on {
      background: var(--text-green);
      color: #000;
      border: 1px solid var(--text-green);
      font-size: 0.85rem;
      padding: 8px 6px;
      margin: 4px 2px;
      width: auto;
      flex: 1;
    }

    .btn-ssr-on:hover:not(:disabled) {
      background: #7fff8d;
    }

    .btn-ssr-off {
      background: #555;
      color: #f5f5f5;
      border: 1px solid #666;
      font-size: 0.85rem;
      padding: 8px 6px;
      margin: 4px 2px;
      width: auto;
      flex: 1;
    }

    .btn-ssr-off:hover:not(:disabled) {
      background: #666;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .ssr-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .diag-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      padding: 3px 0;
      color: var(--text-muted);
    }

    .diag-row span:last-child {
      color: var(--text-main);
    }

    .no-process {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .temp-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 10px;
      margin-bottom: 4px;
    }
  </style>
</head>
  <div class="app-shell">
    <!-- Header -->
    <header class="app-header">
      <div class="app-title">VINODELNYA</div>
      <div class="app-subtitle" id="subtitle">Winery Controller</div>
    </header>
    <hr class="divider">

    <!-- Control Card -->
    <section class="card">
      <div class="card-title">Sensor &amp; Control</div>
      <div class="status-badge" id="statusBadge">STOPPED</div>

      <!-- Setpoint + Load row -->
      <div class="row" style="align-items:flex-end;">
        <div class="metric-primary" style="margin-bottom:0;">
          Setpoint <span id="setpointDisplay">0.0</span>
          <span id="unitDisplay">%</span>
        </div>
        <div class="metric-primary" style="margin-bottom:0;">
          Load: <span id="pwmNow">0.0</span> %
        </div>
      </div>

      <!-- Active Process -->
      <label class="field">
        <span class="field-label">Active Process</span>
        <select id="processSelect" onchange="setProcess(this.value)">
          <option value="0">Off</option>
          <option value="1">Distiller</option>
          <option value="2">Rectifier</option>
        </select>
      </label>

      <!-- Control Mode -->
      <label class="field">
        <span class="field-label">Control Mode</span>
        <select id="controlSelect" onchange="setControl(this.value)">
          <option value="0">Power-Driven</option>
          <option value="1">Temperature-Driven</option>
        </select>
      </label>

      <!-- Setpoint Slider -->
      <div class="field">
        <span class="field-label">Setpoint</span>
        <div class="slider-row">
          <input type="range" id="setpoint" min="0" max="100" step="0.5" value="0"
                 oninput="setSetpoint(this.value)">
          <div class="numeric-box" id="setpointValueBox">0.0</div>
          <div class="unit-box" id="unitBox">%</div>
        </div>
      </div>

      <!-- Temperature Readings -->
      <div class="temp-label">Temperature Readings</div>
      <div class="row">
        <span class="row-label">T1 - Tank:</span>
        <span class="row-value"><span id="t1">0.0</span> °C</span>
      </div>
      <div class="row">
        <span class="row-label">T2 - Outdoor:</span>
        <span class="row-value"><span id="t2">0.0</span> °C</span>
      </div>
      <div class="row">
        <span class="row-label">T3 - Column:</span>
        <span class="row-value"><span id="t3">0.0</span> °C</span>
      </div>
    </section>

    <!-- SSR Card -->
    <section class="card" id="ssrCard">
      <div class="card-title">SSR Switches</div>
      <div id="ssrContent">
        <div class="no-process">No process selected</div>
      </div>
    </section>

    <!-- Control Card -->
    <section class="card">
      <div class="card-title">Control</div>
      <div id="controlButton">
        <button class="btn btn-start" id="startBtn" onclick="send('START')" disabled>Start Process</button>
      </div>
    </section>

    <!-- Config Card -->
    <section class="card">
      <div class="card-title">Configuration</div>
      <button class="btn btn-primary" id="otaBtn" onclick="send('OTA')">Remote OTA Update</button>
      <button class="btn btn-danger" id="restartBtn" onclick="send('RESTART')">Restart Device</button>
    </section>

    <!-- Diagnostic Card -->
    <section class="card">
      <div class="card-title">Diagnostic</div>
      <div class="diag-row">
        <span>WiFi IP:</span>
        <span id="wifiIP">--</span>
      </div>
      <div class="diag-row">
        <span>WiFi SSID:</span>
        <span id="wifiSSID">--</span>
      </div>
      <div class="diag-row">
        <span>Last Update:</span>
        <span id="lastUpdate">--</span>
      </div>
    </section>
  </div>

  <script>
    // --- Command helpers (unchanged protocol) ---
    async function send(cmd) {
      try {
        const response = await fetch("/", {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: cmd
        });
        if (!response.ok) {
          console.error("Command failed:", cmd, response.status);
        }
      } catch (err) {
        console.error("Error sending command:", err);
      }
    }

    function setProcess(v) {
      send("PROCESS:" + v);
    }

    function setControl(v) {
      send("CONTROL:" + v);
    }

    function setSetpoint(v) {
      document.getElementById("setpointValueBox").textContent = v;
      send("SETPOINT:" + v);
    }

    function toggleSSR(which) {
      send("SSR:" + which);
    }

    // --- State polling from /state ---
    async function fetchState() {
      try {
        const res = await fetch("/state", { cache: "no-store" });
        if (!res.ok) return;
        const s = await res.json();
        applyState(s);
      } catch (e) {
        console.error("fetchState error", e);
      }
    }

    function applyState(s) {
      // Status badge & subtitle
      const badge = document.getElementById("statusBadge");
      const subtitle = document.getElementById("subtitle");
      const running = !!s.isRunning;

      badge.textContent = running ? "RUNNING" : "STOPPED";
      badge.classList.toggle("status-running", running);
      badge.classList.toggle("status-stopped", !running);

      subtitle.textContent = "Winery Controller FW " + (s.fw || "");

      // Process / control selects
      const process = Number(s.processMode || 0);
      const control = Number(s.controlMode || 0);
      document.getElementById("processSelect").value = String(process);
      document.getElementById("controlSelect").value = String(control);

      // Setpoint & unit
      const sp = Number(s.setpoint || 0).toFixed(1);
      const rawUnit = control === 0 ? "%" : "C";
      const displayUnit = control === 0 ? "%" : "°C";

      document.getElementById("setpoint").value = sp;
      document.getElementById("setpointDisplay").textContent = sp;
      document.getElementById("setpointValueBox").textContent = sp;
      document.getElementById("unitDisplay").textContent = displayUnit;
      document.getElementById("unitBox").textContent = displayUnit;


      // Enable/disable setpoint slider (process must not be Off)
      const setpointEnabled = process !== 0;
      document.getElementById("setpoint").disabled = !setpointEnabled;

      // Temperatures
      document.getElementById("t1").textContent = Number(s.t1 || 0).toFixed(1);
      document.getElementById("t2").textContent = Number(s.t2 || 0).toFixed(1);
      document.getElementById("t3").textContent = Number(s.t3 || 0).toFixed(1);

      // SSR buttons area
      renderSsrButtons(process, s);

      // Start/Stop button & OTA/Restart safety
      const startBtn = document.getElementById("startBtn");
      const controlBtnDiv = document.getElementById("controlButton");
      let enabledSSR = 0;
      if (process === 1) {
        enabledSSR = (s.ssr1 ? 1 : 0) + (s.ssr2 ? 1 : 0) + (s.ssr3 ? 1 : 0);
      } else if (process === 2) {
        enabledSSR = (s.ssr4 ? 1 : 0) + (s.ssr5 ? 1 : 0);
      }
      const canStart = process !== 0 &&
                       Number(s.setpoint || 0) > 0 &&
                       enabledSSR > 0;
      if (running) {
        controlBtnDiv.innerHTML =
          '<button class="btn btn-stop" id="stopBtn">Stop Process</button>';
        document
          .getElementById("stopBtn")
          .addEventListener("click", () => send("STOP"));
      } else {
        controlBtnDiv.innerHTML =
          '<button class="btn btn-start" id="startBtn">Start Process</button>';
        const sb = document.getElementById("startBtn");
        sb.disabled = !canStart;
        sb.addEventListener("click", () => send("START"));
      }

      // OTA / Restart disabled while running
      document.getElementById("otaBtn").disabled = running;
      document.getElementById("restartBtn").disabled = running;

      // Diagnostics
      if (s.ip) {
        document.getElementById("wifiIP").textContent = s.ip;
      }
      if (s.ssid) {
        document.getElementById("wifiSSID").textContent = s.ssid;
      }
      document.getElementById("lastUpdate").textContent =
        new Date().toLocaleTimeString();
    }

    function renderSsrButtons(process, s) {
      const c = document.getElementById("ssrContent");
      const sp = Number(s.setpoint || 0);
      const disabledAttr = sp === 0 ? " disabled" : "";

      if (process === 0) {
        c.innerHTML =
          '<div class="no-process">No process selected</div>';
        return;
      }

      if (process === 1) {
        // Distiller: SSR 1–3
        c.innerHTML =
          '<div class="no-process" style="margin-bottom:10px;">DISTILLER SSRS (1–3)</div>' +
          '<div class="ssr-row">' +
          ssrButtonHtml("S1", s.ssr1, disabledAttr) +
          ssrButtonHtml("S2", s.ssr2, disabledAttr) +
          ssrButtonHtml("S3", s.ssr3, disabledAttr) +
          "</div>";
      } else {
        // Rectifier: SSR 4–5
        c.innerHTML =
          '<div class="no-process" style="margin-bottom:10px;">RECTIFIER SSRS (4–5)</div>' +
          '<div class="ssr-row">' +
          ssrButtonHtml("S4", s.ssr4, disabledAttr) +
          ssrButtonHtml("S5", s.ssr5, disabledAttr) +
          "</div>";
      }

      // attach click handlers
      ["S1", "S2", "S3", "S4", "S5"].forEach((id) => {
        const btn = document.getElementById("btn-" + id);
        if (btn) {
          btn.addEventListener("click", () => toggleSSR(id));
        }
      });
    }

    function ssrButtonHtml(id, enabled, disabledAttr) {
      const on = !!enabled;
      const cls = on ? "btn-ssr-on" : "btn-ssr-off";
      return (
        '<button class="btn ' +
        cls +
        '" id="btn-' +
        id +
        '"' +
        disabledAttr +
        ">" +
        id +
        "</button>"
      );
    }

    // Initialize polling
    window.addEventListener("DOMContentLoaded", () => {
      fetchState();                 // first load
      setInterval(fetchState, 1000); // poll every second
    });
  </script>

</body>
</html>
